{% extends 'base.html' %}

{% block title %}{{ photo.title }} - Photo Gallery{% endblock %}

{% block content %}
    <a href="{% url 'gallery_home' %}" class="text-blue-600 hover:underline">&larr; Back to gallery</a>

    <div class="mt-4 bg-white rounded shadow overflow-hidden max-w-2xl">
        <img src="{{ photo.image.url }}" alt="{{ photo.title }}" class="w-full max-h-96 object-cover">
        <div class="p-6">
            <h1 class="text-2xl font-bold mb-2">{{ photo.title }}</h1>
            <p class="text-gray-600 mb-4">{{ photo.description }}</p>

            <div class="flex flex-wrap gap-2 mb-4">
                {% for tag in photo.tags.all %}
                    <a href="{% url 'gallery_home' %}?tag={{ tag.name }}"
                       class="text-xs bg-gray-200 text-gray-700 px-2 py-1 rounded hover:bg-gray-300">
                        {{ tag.name }}
                    </a>
                {% endfor %}
            </div>

            <p class="text-sm text-gray-500">Uploaded by {{ photo.uploaded_by.username }}</p>
        </div>
    </div>
{% endblock %}
